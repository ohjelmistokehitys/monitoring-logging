services:
  postgres:
    image: postgres:latest
    container_name: database

    env_file: .env

    volumes:
      - postgres:/var/lib/postgresql/data
      - ./sql/:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 10

    ports:
      - 5432:5432

  app:
    build: ./app
    container_name: app
    env_file: .env
    ports:
      - 3000:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres:
