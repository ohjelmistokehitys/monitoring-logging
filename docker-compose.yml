services:
  postgres:
    container_name: postgres
    image: postgres:latest
    env_file: .env
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./sql/:/docker-entrypoint-initdb.d

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 10

    ports:
      - 5432:5432

  app:
    build: ./app
    container_name: app
    env_file: .env
    ports:
      - 3333:3333
    depends_on:
      postgres:
        condition: service_healthy
